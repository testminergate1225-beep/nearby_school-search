<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f9fa;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 400px;
            margin: 60px auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 32px 24px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        label {
            display: block;
            margin-top: 16px;
            margin-bottom: 6px;
            color: #333;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1em;
        }
        button {
            margin-top: 24px;
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:disabled {
            background: #b0c4de;
            cursor: not-allowed;
        }
        .status {
            margin-top: 18px;
            text-align: center;
            color: #007bff;
            font-weight: bold;
        }
        .toast {
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: #fff;
    padding: 18px 32px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    z-index: 9999;
    min-width: 320px;
    text-align: center;
}
.progress-bar-bg {
    width: 100%;
    height: 8px;
    background: #eee;
    border-radius: 4px;
    margin-top: 12px;
    overflow: hidden;
}
.progress-bar-fill {
    height: 100%;
    background: #007bff;
    width: 0%;
    transition: width 0.3s;
}
    </style>

</head>
<!-- Removed duplicate script block to fix redeclaration error -->



<body>
    <div class="container">
        <h1>Search Nearby Schools</h1>
        <label for="address">Address</label>
        <input type="text" id="address" placeholder="Enter address" value="De La Paz, Pasig, Philippines">
        <label for="radius">Radius (meters)</label>
        <input type="number" id="radius" placeholder="e.g. 5000" value="5000" min="100" max="50000">
        
        <button id="search-btn">Search</button>
        <div class="toast" id="toast" style="display:none;">
            <span id="toast-message">Searching...</span>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-bar-fill" style="width:0%"></div>
            </div>
        </div>
        <div class="status" id="status"></div>
        <button id="view-list-btn" style="display:none;">View List</button>
    </div>
    <script>
    const searchBtn = document.getElementById('search-btn');
    const viewListBtn = document.getElementById('view-list-btn');
    const statusDiv = document.getElementById('status');

    searchBtn.onclick = async function() {
        const address = document.getElementById('address').value.trim();
        const radius = document.getElementById('radius').value.trim();
        if (!address || !radius) {
            statusDiv.textContent = 'Please enter both address and radius.';
            return;
        }
        statusDiv.textContent = '';
        searchBtn.disabled = true;
        viewListBtn.style.display = 'none';

        // Show toast and progress bar
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toast-message');
        const progressBar = document.getElementById('progress-bar-fill');
        toast.style.display = 'block';
        toastMsg.textContent = 'Searching...';
        progressBar.style.width = '0%';

        // Simulate progress bar (since backend is not streaming progress)
        let progress = 0;
        let fakeProgress = setInterval(() => {
            if (progress < 90) {
                progress += Math.random() * 5 + 2; // random increment
                if (progress > 90) progress = 90;
                progressBar.style.width = progress + '%';
            }
        }, 400);

        try {
            const response = await fetch(`/run-search?address=${encodeURIComponent(address)}&radius=${encodeURIComponent(radius)}`);
            clearInterval(fakeProgress);
            progressBar.style.width = '100%';
            if (response.ok) {
                toastMsg.textContent = 'Search complete!';
                setTimeout(() => { toast.style.display = 'none'; }, 1200);
                statusDiv.textContent = 'Search complete!';
                viewListBtn.style.display = 'block';
            } else {
                let errorMsg = 'Search failed. Please try again.';
                try {
                    const error = await response.json();
                    if (error && error.output) errorMsg += ' ' + error.output;
                } catch {}
                toastMsg.textContent = errorMsg;
                statusDiv.textContent = errorMsg;
                setTimeout(() => { toast.style.display = 'none'; }, 2000);
            }
        } catch (e) {
            clearInterval(fakeProgress);
            toastMsg.textContent = 'Error connecting to backend.';
            statusDiv.textContent = 'Error connecting to backend.';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }
        searchBtn.disabled = false;
    };

    viewListBtn.onclick = function() {
        window.location.href = 'school-list.html';
    };
    </script>
</body>
</html>
