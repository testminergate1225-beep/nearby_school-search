<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nearby Schools List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f9fa;
            margin: 0;
            padding: 0;
        }
        .container {
                    #back-btn:hover {
                        background: #495057 !important;
                        color: #fff;
                    }
            max-width: 1400px;
            margin: 40px auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 40px 32px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
        }
        table {
            width: 100%;
            min-width: 1100px;
            border-collapse: collapse;
            margin-top: 24px;
        }
        th, td {
            padding: 12px 8px;
            border-bottom: 1px solid #e1e1e1;
            text-align: left;
        }
        th {
            background: #007bff;
            color: #fff;
        }
        tr:hover {
            background: #f1f7ff;
        }
        @media (max-width: 600px) {
            .container { padding: 8px; }
            table, thead, tbody, th, td, tr { display: block; }
            th { position: absolute; left: -9999px; top: -9999px; }
            td { border: none; position: relative; padding-left: 50%; }
            td:before {
                position: absolute;
                left: 8px;
                top: 12px;
                white-space: nowrap;
                font-weight: bold;
            }
            td:nth-of-type(1):before { content: "Name"; }
            td:nth-of-type(2):before { content: "Address"; }
            td:nth-of-type(3):before { content: "Rating"; }
            td:nth-of-type(4):before { content: "User Ratings"; }
            td:nth-of-type(5):before { content: "Latitude"; }
            td:nth-of-type(6):before { content: "Longitude"; }
        }
    </style>
</head>
<body>
    <div class="container">
        <button id="back-btn" style="margin-bottom: 18px; float: right; background: #cbd2d8;">Back</button>
        <h1>Nearby Schools List</h1>
        <div class="table-wrapper">
            <table id="schools-table">
                <caption id="school-count" style="caption-side: top; text-align: right; font-weight: bold; color: #007bff;"></caption>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Address</th>
                        <th>Rating</th>
                        <th>User Ratings</th>
                        <th>Latitude</th>
                        <th>Longitude</th>
                        <th>Distance (km)</th>
                        <th>Website / Facebook</th>
                        <th>View Maps</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- School rows will be inserted here by JavaScript -->
                </tbody>
            </table>
        </div>
    </div>
    <script>
    document.getElementById('back-btn').onclick = function() {
        window.location.href = 'index.html';
    };
        fetch('schools.json?' + new Date().getTime())
            .then(response => response.json())
            .then(schools => {
                const tbody = document.querySelector('#schools-table tbody');

                // Prompt for user's location
                let userLat = null, userLng = null;
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(function(position) {
                        userLat = position.coords.latitude;
                        userLng = position.coords.longitude;
                        renderTable();
                    }, function() {
                        renderTable(); // fallback if denied
                    });
                } else {
                    renderTable();
                }

                function haversine(lat1, lon1, lat2, lon2) {
                    function toRad(x) { return x * Math.PI / 180; }
                    const R = 6371; // km
                    const dLat = toRad(lat2 - lat1);
                    const dLon = toRad(lon2 - lon1);
                    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                                        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
                                        Math.sin(dLon/2) * Math.sin(dLon/2);
                    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                    return R * c;
                }

                function renderTable() {
                    tbody.innerHTML = '';
                    // Compute distances and sort
                    let schoolsWithDistance = schools.map(school => {
                        let distance = '';
                        if (userLat !== null && userLng !== null) {
                            distance = haversine(userLat, userLng, school.latitude, school.longitude);
                        }
                        return { ...school, _distance: distance };
                    });
                    if (userLat !== null && userLng !== null) {
                        schoolsWithDistance.sort((a, b) => a._distance - b._distance);
                    }
                    schoolsWithDistance.forEach((school, idx) => {
                        let distance = '';
                        if (school._distance !== '') {
                            distance = school._distance.toFixed(2);
                        }
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${idx + 1}</td>
                            <td>${school.name || ''}</td>
                            <td>${school.address || ''}</td>
                            <td>${school.rating !== undefined && school.rating !== null ? school.rating : ''}</td>
                            <td>${school.user_ratings_total !== undefined && school.user_ratings_total !== null ? school.user_ratings_total : ''}</td>
                            <td>${school.latitude}</td>
                            <td>${school.longitude}</td>
                            <td>${distance}</td>
                            <td>
                                ${school.website ? `<a href="${school.website}" target="_blank" rel="noopener">Website</a>` : ''}
                                ${school.facebook ? `<br><a href="${school.facebook}" target="_blank" rel="noopener">Facebook</a>` : ''}
                            </td>
                            <td><button onclick="window.open('https://www.google.com/maps?q=' + encodeURIComponent('${school.latitude},${school.longitude}'), '_blank')">View on Map</button></td>
                        `;
                        tbody.appendChild(tr);
                    });
                    // Show total count
                    document.getElementById('school-count').textContent = `Total Schools: ${schools.length}`;
                }
            })
            .catch(err => {
                document.querySelector('#schools-table tbody').innerHTML = '<tr><td colspan="9">Could not load schools.json</td></tr>';
            });
    </script>
</body>
</html>
